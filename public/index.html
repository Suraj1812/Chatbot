<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8f5;
        --ink: #18211f;
        --muted: #65706c;
        --line: #d9dfda;
        --soft: #eef2ee;
        --user: #173f35;
        --accent: #23715f;
        --accent-hover: #1b5d4e;
        --error: #9a3d1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      header {
        height: 58px;
        padding: 0 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 248, 245, 0.96);
        position: sticky;
        top: 0;
        z-index: 2;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      button,
      select {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }

      button {
        padding: 0 12px;
        cursor: pointer;
        font-weight: 700;
      }

      button:disabled,
      select:disabled,
      textarea:disabled,
      input:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--accent-hover);
      }

      select {
        padding: 0 8px;
      }

      .chat {
        width: min(860px, 100%);
        margin: 0 auto;
        padding: 22px 16px 120px;
      }

      .empty {
        min-height: calc(100vh - 210px);
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
      }

      .empty h2 {
        margin: 0 0 8px;
        color: var(--ink);
        font-size: 28px;
        letter-spacing: 0;
      }

      .empty p {
        margin: 0;
        font-size: 15px;
      }

      .messages {
        display: grid;
        gap: 18px;
      }

      .message {
        display: grid;
        gap: 8px;
      }

      .message.user {
        justify-items: end;
      }

      .bubble {
        max-width: min(690px, 100%);
        padding: 12px 14px;
        border-radius: 8px;
        line-height: 1.48;
        white-space: pre-wrap;
      }

      .user .bubble {
        background: var(--user);
        color: #fff;
      }

      .assistant .bubble {
        padding-left: 0;
        padding-right: 0;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 8px;
        background: #fff;
        color: var(--muted);
      }

      .mini-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .mini-actions button {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      .composer-wrap {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 16px 18px;
        background: linear-gradient(to top, var(--bg) 82%, rgba(247, 248, 245, 0));
      }

      .composer {
        width: min(860px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      textarea {
        width: 100%;
        min-height: 48px;
        max-height: 160px;
        resize: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 13px 14px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        line-height: 1.35;
        outline: none;
      }

      textarea:focus {
        border-color: var(--accent);
      }

      .status {
        width: min(860px, 100%);
        min-height: 18px;
        margin: 6px auto 0;
        color: var(--error);
        font-size: 13px;
      }

      dialog {
        width: min(760px, calc(100% - 28px));
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0;
        color: var(--ink);
      }

      dialog::backdrop {
        background: rgba(20, 28, 25, 0.34);
      }

      .data-head,
      .data-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 14px;
      }

      .data-head {
        border-bottom: 1px solid var(--line);
      }

      .data-head strong {
        font-size: 16px;
      }

      .data-actions {
        border-top: 1px solid var(--line);
      }

      .scrape-bar {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }

      .learn-bar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }

      .learn-bar textarea {
        min-height: 54px;
        max-height: 120px;
        border-radius: 6px;
        font-size: 14px;
      }

      .scrape-bar input {
        min-width: 0;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 10px;
        font: inherit;
      }

      .scrape-bar label {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .scrape-bar input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }

      #data-input {
        min-height: 420px;
        border: 0;
        border-radius: 0;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 13px;
      }

      .ghost {
        background: transparent;
      }

      @media (max-width: 640px) {
        header {
          padding: 0 12px;
        }

        h1 {
          font-size: 16px;
        }

        .count {
          display: none;
        }

        select {
          width: 104px;
        }

        .chat {
          padding-inline: 12px;
        }

        .empty h2 {
          font-size: 22px;
        }

        .composer-wrap {
          padding-inline: 12px;
        }

        .scrape-bar {
          grid-template-columns: 1fr;
        }

        .learn-bar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Local Chat</h1>
        <div class="topbar">
          <span class="count" id="source-count"></span>
          <select id="level" aria-label="Level">
            <option value="beginner">Beginner</option>
            <option value="intermediate" selected>Normal</option>
            <option value="advanced">Advanced</option>
          </select>
          <button id="open-data" type="button">Data</button>
        </div>
      </header>

      <main class="chat">
        <div class="empty" id="empty">
          <div>
            <h2>Ask your local data.</h2>
            <p id="empty-subtitle"></p>
          </div>
        </div>
        <div class="messages" id="messages"></div>
      </main>

      <div class="composer-wrap">
        <form class="composer" id="chat-form">
          <textarea id="query" rows="1" placeholder="Ask anything..." autocomplete="off"></textarea>
          <button class="primary" id="ask-button" type="submit">Ask</button>
        </form>
        <div class="status" id="status"></div>
      </div>
    </div>

    <dialog id="data-dialog">
      <div class="data-head">
        <strong>Data</strong>
        <button class="ghost" id="close-data" type="button">Close</button>
      </div>
      <div class="scrape-bar">
        <input id="scrape-url" placeholder="https://example.com/page" />
        <label><input id="scrape-deep" type="checkbox" /> Follow links</label>
        <button id="scrape-data" type="button">Scrape</button>
      </div>
      <div class="learn-bar">
        <textarea id="learn-text" rows="2" placeholder="Teach it a local note..."></textarea>
        <button id="learn-data" type="button">Learn</button>
      </div>
      <textarea id="data-input" spellcheck="false"></textarea>
      <div class="data-actions">
        <button id="reset-data" type="button">Reset</button>
        <button class="primary" id="save-data" type="button">Save</button>
      </div>
    </dialog>

    <script>
      const messages = document.querySelector("#messages");
      const empty = document.querySelector("#empty");
      const emptySubtitle = document.querySelector("#empty-subtitle");
      const statusLine = document.querySelector("#status");
      const queryInput = document.querySelector("#query");
      const sourceCount = document.querySelector("#source-count");
      const dataDialog = document.querySelector("#data-dialog");
      const dataInput = document.querySelector("#data-input");
      const levelInput = document.querySelector("#level");
      const scrapeUrlInput = document.querySelector("#scrape-url");
      const scrapeDeepInput = document.querySelector("#scrape-deep");
      const askButton = document.querySelector("#ask-button");
      const scrapeButton = document.querySelector("#scrape-data");
      const saveButton = document.querySelector("#save-data");
      const resetButton = document.querySelector("#reset-data");
      const openDataButton = document.querySelector("#open-data");
      const learnTextInput = document.querySelector("#learn-text");
      const learnButton = document.querySelector("#learn-data");

      let sourceTotal = 0;
      let lastAnswer = null;
      let lastQuery = "";

      function setStatus(text = "", isError = true) {
        statusLine.style.color = isError ? "var(--error)" : "var(--muted)";
        statusLine.textContent = text;
      }

      function resizeInput() {
        queryInput.style.height = "auto";
        queryInput.style.height = `${Math.min(queryInput.scrollHeight, 160)}px`;
      }

      function setBusy(type, busy) {
        if (type === "chat") {
          askButton.disabled = busy;
          queryInput.disabled = busy;
          levelInput.disabled = busy;
          askButton.textContent = busy ? "..." : "Ask";
        }

        if (type === "data") {
          saveButton.disabled = busy;
          resetButton.disabled = busy;
          dataInput.disabled = busy;
          openDataButton.disabled = busy;
          learnButton.disabled = busy;
          learnTextInput.disabled = busy;
          saveButton.textContent = busy ? "Saving..." : "Save";
        }

        if (type === "scrape") {
          scrapeButton.disabled = busy;
          scrapeUrlInput.disabled = busy;
          scrapeDeepInput.disabled = busy;
          saveButton.disabled = busy;
          resetButton.disabled = busy;
          dataInput.disabled = busy;
          learnButton.disabled = busy;
          learnTextInput.disabled = busy;
          scrapeButton.textContent = busy ? "Scraping..." : "Scrape";
        }

        if (type === "learn") {
          learnButton.disabled = busy;
          learnTextInput.disabled = busy;
          scrapeButton.disabled = busy;
          saveButton.disabled = busy;
          resetButton.disabled = busy;
          learnButton.textContent = busy ? "Learning..." : "Learn";
        }
      }

      function refreshEmptyState() {
        empty.hidden = messages.children.length > 0;
        emptySubtitle.textContent = sourceTotal ? `${sourceTotal} sources ready` : "";
      }

      function addMessage(role, text, payload) {
        const wrap = document.createElement("div");
        wrap.className = `message ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        if (role === "assistant" && payload) {
          const answerText = payload["Direct Answer"] || "";
          bubble.textContent = answerText;
          const meta = document.createElement("div");
          meta.className = "meta-row";
          const confidence = document.createElement("span");
          confidence.className = "pill";
          const percent = Math.round((payload.confidence || 0) * 100);
          confidence.textContent = `confidence ${percent}%`;
          meta.append(confidence);
          for (const citation of payload.sources || []) {
            const source = document.createElement("span");
            source.className = "pill";
            source.textContent = citation;
            meta.append(source);
          }
          bubble.append(meta);

          const actions = document.createElement("div");
          actions.className = "mini-actions";
          const good = document.createElement("button");
          good.type = "button";
          good.textContent = "Good";
          const feedbackQuery = lastQuery;
          good.addEventListener("click", () => sendFeedback("up", feedbackQuery, answerText, good, bad));
          const bad = document.createElement("button");
          bad.type = "button";
          bad.textContent = "Bad";
          bad.addEventListener("click", () => sendFeedback("down", feedbackQuery, answerText, bad, good));
          actions.append(good, bad);
          bubble.append(actions);
        } else {
          bubble.textContent = text;
        }

        wrap.append(bubble);
        messages.append(wrap);
        refreshEmptyState();
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }

      async function requestJson(url, options) {
        const response = await fetch(url, options);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Something went wrong.");
        return payload;
      }

      async function loadData() {
        const payload = await requestJson("/data");
        sourceTotal = payload.scrapedData.length;
        const factTotal = payload.knowledgeBase?.facts?.length || 0;
        sourceCount.textContent = `${sourceTotal} sources · ${factTotal} facts`;
        dataInput.value = JSON.stringify(payload.scrapedData, null, 2);
        refreshEmptyState();
      }

      async function sendFeedback(rating, query, answer, clicked, other) {
        if (!answer || !query) return;
        clicked.disabled = true;
        other.disabled = true;
        try {
          await requestJson("/feedback", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              rating,
              query,
              answer
            })
          });
          clicked.textContent = rating === "up" ? "Saved" : "Noted";
          await loadData();
        } catch (error) {
          setStatus(error.message);
          clicked.disabled = false;
          other.disabled = false;
        }
      }

      document.querySelector("#chat-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const query = queryInput.value.trim();
        if (!query) return;

        addMessage("user", query);
        queryInput.value = "";
        resizeInput();
        setStatus("Thinking...", false);
        setBusy("chat", true);

        try {
          const payload = await requestJson("/ask", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              query,
              user_profile: { level: levelInput.value }
            })
          });
          lastQuery = query;
          lastAnswer = payload["Direct Answer"] || "";
          addMessage("assistant", "", payload);
          setStatus("");
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy("chat", false);
        }
      });

      queryInput.addEventListener("input", resizeInput);
      queryInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          document.querySelector("#chat-form").requestSubmit();
        }
      });

      document.querySelector("#open-data").addEventListener("click", () => dataDialog.showModal());
      document.querySelector("#close-data").addEventListener("click", () => dataDialog.close());

      document.querySelector("#save-data").addEventListener("click", async () => {
        setStatus("");
        setBusy("data", true);
        try {
          const scraped_data = JSON.parse(dataInput.value);
          const payload = await requestJson("/data", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ scraped_data })
          });
          sourceTotal = payload.count;
          sourceCount.textContent = `${sourceTotal} sources`;
          refreshEmptyState();
          dataDialog.close();
          setStatus("Saved.", false);
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy("data", false);
        }
      });

      document.querySelector("#scrape-data").addEventListener("click", async () => {
        const urls = scrapeUrlInput.value.trim();
        if (!urls) return;
        setStatus("Scraping...", false);
        setBusy("scrape", true);
        try {
          const payload = await requestJson("/scrape", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              urls,
              depth: scrapeDeepInput.checked,
              maxPages: scrapeDeepInput.checked ? 10 : 5
            })
          });
          await loadData();
          scrapeUrlInput.value = "";
          const warning = payload.errors?.length ? ` ${payload.errors.length} skipped.` : "";
          setStatus(`Added ${payload.added}.${warning}`, false);
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy("scrape", false);
        }
      });

      document.querySelector("#learn-data").addEventListener("click", async () => {
        const text = learnTextInput.value.trim();
        if (!text) return;
        setStatus("Learning...", false);
        setBusy("learn", true);
        try {
          await requestJson("/learn", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              text,
              source: "local-note",
              topic: "Local Note"
            })
          });
          learnTextInput.value = "";
          await loadData();
          setStatus("Learned.", false);
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy("learn", false);
        }
      });

      document.querySelector("#reset-data").addEventListener("click", async () => {
        setBusy("data", true);
        try {
          const payload = await requestJson("/reset", { method: "POST" });
          sourceTotal = payload.count;
          await loadData();
          dataDialog.close();
          setStatus("Reset.", false);
        } catch (error) {
          setStatus(error.message);
        } finally {
          setBusy("data", false);
        }
      });

      loadData().catch((error) => setStatus(error.message));
      resizeInput();
    </script>
  </body>
</html>
