<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Knowledge Chatbot</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172026;
        --muted: #5b6770;
        --line: #d6dde2;
        --panel: #ffffff;
        --wash: #f4f7f8;
        --accent: #136f63;
        --accent-strong: #0f594f;
        --warn: #915f12;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--wash);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 24px auto;
        display: grid;
        grid-template-columns: minmax(280px, 380px) 1fr;
        gap: 18px;
      }

      header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 16px;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 700;
        font-size: 13px;
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        font: inherit;
        background: #fff;
      }

      textarea {
        min-height: 230px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 12px;
        color: #fff;
        background: var(--accent);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .row > * {
        flex: 1;
      }

      .answer {
        display: grid;
        gap: 12px;
      }

      .answer-block {
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .answer-block:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .answer-block strong {
        display: block;
        margin-bottom: 4px;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        white-space: pre-wrap;
      }

      .status {
        min-height: 20px;
        color: var(--warn);
        font-size: 13px;
      }

      @media (max-width: 780px) {
        main {
          grid-template-columns: 1fr;
          margin: 16px auto;
        }

        header {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Local Knowledge Chatbot</h1>
          <p>Answers from local scraped data only.</p>
        </div>
        <p id="source-count">Loading sources...</p>
      </header>

      <section>
        <h2>Scraped Data</h2>
        <label for="data">JSON input</label>
        <textarea id="data" spellcheck="false"></textarea>
        <button id="save-data" type="button">Save Local Data</button>
        <p class="status" id="data-status"></p>
      </section>

      <section>
        <h2>Ask</h2>
        <label for="level">User level</label>
        <select id="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <label for="query">Question</label>
        <div class="row">
          <input id="query" value="How should I build an offline chatbot?" />
          <button id="ask" type="button">Ask</button>
        </div>

        <p class="status" id="chat-status"></p>
        <div class="answer" id="answer"></div>
      </section>
    </main>

    <script>
      const dataInput = document.querySelector("#data");
      const dataStatus = document.querySelector("#data-status");
      const chatStatus = document.querySelector("#chat-status");
      const answer = document.querySelector("#answer");
      const sourceCount = document.querySelector("#source-count");

      function renderAnswer(payload) {
        answer.innerHTML = "";
        for (const key of ["Direct Answer", "Explanation", "Contextual Advice", "Suggestions"]) {
          const block = document.createElement("div");
          block.className = "answer-block";
          block.innerHTML = `<strong>${key}</strong><div></div>`;
          block.querySelector("div").textContent = payload[key] || "";
          answer.appendChild(block);
        }

        const meta = document.createElement("details");
        meta.className = "meta";
        meta.innerHTML = "<summary>Local match details</summary><pre></pre>";
        meta.querySelector("pre").textContent = JSON.stringify(payload.metadata?.matchedSources || [], null, 2);
        answer.appendChild(meta);
      }

      async function loadData() {
        const response = await fetch("/api/data");
        const payload = await response.json();
        dataInput.value = JSON.stringify(payload.scrapedData, null, 2);
        sourceCount.textContent = `${payload.scrapedData.length} local sources`;
      }

      document.querySelector("#save-data").addEventListener("click", async () => {
        dataStatus.textContent = "";
        try {
          const scraped_data = JSON.parse(dataInput.value);
          const response = await fetch("/api/data", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ scraped_data })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || "Unable to save data.");
          sourceCount.textContent = `${payload.count} local sources`;
          dataStatus.textContent = "Saved.";
        } catch (error) {
          dataStatus.textContent = error.message;
        }
      });

      document.querySelector("#ask").addEventListener("click", async () => {
        chatStatus.textContent = "";
        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              query: document.querySelector("#query").value,
              user_profile: { level: document.querySelector("#level").value }
            })
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.error || "Unable to answer.");
          renderAnswer(payload);
        } catch (error) {
          chatStatus.textContent = error.message;
        }
      });

      loadData();
    </script>
  </body>
</html>
